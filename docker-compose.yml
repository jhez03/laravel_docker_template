services:
  php:
    build: .
    volumes:
      - .:/var/www
    env_file:
      - .env.docker

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      - NGINX_HOST=localhost
    depends_on:
      - php

  db:
    image: mysql:8.0
    env_file:
      - .env.docker
    environment:
      MYSQL_DATABASE: laravel
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
  #---service for phpmyadmin--#
  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    ports:
      - "8080:80"
    depends_on:
      - db
